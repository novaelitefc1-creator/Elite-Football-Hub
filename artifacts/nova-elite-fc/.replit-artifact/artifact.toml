kind = "web"
previewPath = "/"
title = "Nova Elite FC Academy"
version = "1.0.0"
id = "artifacts/nova-elite-fc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18641

[services.development]
run = "pnpm --filter @workspace/nova-elite-fc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nova-elite-fc", "run", "build" ]
publicDir = "artifacts/nova-elite-fc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18641"
BASE_PATH = "/"
